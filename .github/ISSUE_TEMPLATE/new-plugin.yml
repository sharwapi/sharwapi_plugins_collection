name: "插件提交 / Plugin Submit"
description: "提交新插件 / For submitting new plugins"
title: "[New] "
labels:
  - "new plugin"

body:
  - type: markdown
    attributes:
      value: |
        插件信息在issue通过后写入 `plugin.json` 中，内容大概如下所示
        Please fill in the plugin information as shown below. The information will be added to `plugins.json` after the issue is approved.
        ```json
        "plugin name":{
        "name": "plugin's display name",
        "author": "author's name",
        "description": "English description...",
        "description_zh": "中文介绍...",
        "url": "url to plugin's repository",
        "auth": "pgp-fingerprint key id or ssh-rsa pubkey"
        }
        ```

  - type: input
    id: plugin-name
    attributes:
      label: 插件名称(Plugin Name)
      description: 用于标识插件的唯一名称(内容只允许**A-Z, a-z, 0-9**，填入后无法变动) / Used to identify the unique name of the plugin (only **A-Z, a-z, 0-9** are allowed, and cannot be changed after filling in.)
      placeholder: e.g. apimgr,guard
    validations:
      required: true
  
  - type: input
    id: name
    attributes:
      label: 显示名称(Display Name)
      description: 用于在插件市场中显示的名称(内容不做限制，但推荐使用英文) / Used to display the name in the plugin market (no content restrictions, but English is recommended)
      placeholder: e.g. API Manager,Route Guard
    validations:
      required: true
  
  - type: input
    id: author
    attributes:
      label: 作者(Author)
      description: 用于在插件市场中显示的作者名称 / Used to display the author's name in the plugin market
      placeholder: e.g. SharwOrange
    validations:
      required: true
  
  - type: textarea
    id: description
    attributes:
      label: 英文介绍(Description - English)
      description: 用于在插件市场中显示的英文介绍 / Used to display the English description in the plugin market
      placeholder: e.g. This is a plugin for ...
    validations:
      required: true
  
  - type: textarea
    id: description_zh
    attributes:
      label: 中文介绍(Description - Chinese)
      description: 用于在插件市场中显示的中文介绍 / Used to display the Chinese description in the plugin market
      placeholder: e.g. 这是一个用于...的插件
    validations:
      required: false
  
  - type: input
    id: url
    attributes:
      label: 插件仓库或下载地址(Repository URL or Download URL)
      description: 在插件市场点击后会跳转的地址(只允许URL链接) / The address that will be redirected to when clicked in the plugin market (only URL links are allowed)
      placeholder: e.g. https://github.com/sharwapi/sharwapi.Plugin.apimgr
    validations:
      required: true
  
  - type: input
    id: auth
    attributes:
      label: 认证信息(Authentication Info)
      description: 用于验证身份的GPG密钥或SSH密钥(commit需要使用对应的密钥签名) / GPG key or SSH key used to authenticate the identity (commits need to be signed with the corresponding key)
      placeholder: e.g. pgp-fingerprint key id or ssh-rsa pubkey
    validations:
      required: true