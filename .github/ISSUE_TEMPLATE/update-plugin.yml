name: "编辑插件信息 / Update Plugin Info"
description: "用于编辑插件信息 / For updating plugin information"
title: "[Update] "
labels:
  - "plugin update"

body:
  - type: markdown
    attributes:
      value: |
        只填写需要修改的字段，不修改的字段请留空。
        Fill in only the fields you want to update. Leave others blank.

  - type: input
    id: plugin-name
    attributes:
      label: 插件名称(Plugin Name)
      description: 用于标识插件的唯一名称(必须填写已存在的插件名称) / Used to identify the unique name of the plugin (Must be an existing Plugin Name)
      placeholder: e.g. apimgr,guard
    validations:
      required: true

  - type: textarea
    id: update-reason
    attributes:
      label: 修改原因 (Reason for Update)
      description: 简述修改原因 / Briefly describe the reason for the update
      placeholder: e.g. Fixed a typo in description / Updated repository URL
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: 显示名称(Display Name)
      description: 用于在插件市场中显示的名称(内容不做限制，但推荐使用英文) / Used to display the name in the plugin market (no content restrictions, but English is recommended)
      placeholder: e.g. API Manager,Route Guard
    validations:
      required: false
  
  - type: input
    id: author
    attributes:
      label: 作者(Author)
      description: 用于在插件市场中显示的作者名称 / Used to display the author's name in the plugin market
      placeholder: e.g. SharwOrange
    validations:
      required: false
  
  - type: textarea
    id: description
    attributes:
      label: 英文介绍(Description - English)
      description: 用于在插件市场中显示的英文介绍 / Used to display the English description in the plugin market
      placeholder: e.g. This is a plugin for ...
    validations:
      required: false
  
  - type: textarea
    id: description_zh
    attributes:
      label: 中文介绍(Description - Chinese)
      description: 用于在插件市场中显示的中文介绍 / Used to display the Chinese description in the plugin market
      placeholder: e.g. 这是一个用于...的插件
    validations:
      required: false
  
  - type: input
    id: url
    attributes:
      label: 插件仓库或下载地址(Repository URL or Download URL)
      description: 在插件市场点击后会跳转的地址(只允许URL链接) / The address that will be redirected to when clicked in the plugin market (only URL links are allowed)
      placeholder: e.g. https://github.com/sharwapi/sharwapi.Plugin.apimgr
    validations:
      required: false

  - type: input
    id: auth
    attributes:
      label: 认证信息(Authentication Info)
      description: 仅在需要更换签名密钥时填写。修改此项需要验证旧密钥的签名。 / Only fill this if you need to rotate keys. Verifying the old key signature is required to change this.
      placeholder: e.g. pgp-fingerprint key id or ssh-rsa pubkey
    validations:
      required: false