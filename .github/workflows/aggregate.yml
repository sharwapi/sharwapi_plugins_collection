##########################################################################
#
# aggregate.yml - SharwAPI Plugin Registry Aggregator
#
# Triggered on push to main when files under data/ are changed.
# Runs utils/aggregate.py to rebuild plugins.json from all data/*.json,
# then updates plugins.json via GitHub API (bypasses branch protection rules).
#
##########################################################################

name: Aggregate plugins.json

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'data/**'

permissions:
  contents: write   # needed for GitHub API file update

jobs:
  aggregate:
    name: Rebuild plugins.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run aggregator
        run: python utils/aggregate.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet plugins.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update plugins.json via GitHub API
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Base64-encode the new file content
          CONTENT=$(base64 -w 0 plugins.json)
          # Get the current file's SHA (required by GitHub API for updates)
          SHA=$(gh api repos/${{ github.repository }}/contents/plugins.json --jq .sha)
          # Update the file via API (not git push, bypasses PR ruleset requirement)
          gh api repos/${{ github.repository }}/contents/plugins.json \
            --method PUT \
            -f message="chore: regenerate plugins.json [skip ci]" \
            -f content="$CONTENT" \
            -f sha="$SHA"
