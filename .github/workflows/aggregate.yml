##########################################################################
#
# aggregate.yml - SharwAPI Plugin Registry Aggregator
#
# Triggered on push to main when files under data/ are changed.
# Runs utils/aggregate.py to rebuild plugins.json from all data/*.json,
# then commits and pushes the updated plugins.json automatically.
#
##########################################################################

name: Aggregate plugins.json

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'data/**'

permissions:
  contents: write   # needed to commit and push plugins.json

jobs:
  aggregate:
    name: Rebuild plugins.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run aggregator
        run: python utils/aggregate.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet plugins.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push plugins.json
        # if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins.json
          git commit -m "chore: regenerate plugins.json [skip ci]"
          git push
